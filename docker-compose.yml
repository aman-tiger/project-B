# ─────────────────────────────────────────────────────────────
# Devonz (devonz.diy) — Docker Compose for Dokploy
# Production configuration — GitHub source + build
# ─────────────────────────────────────────────────────────────

services:
  devonz:
    # ✅ ТОЛЬКО build: для Dokploy + GitHub source
    # ❌ image: УДАЛЕН — конфликтует со сборкой из репозитория
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - ghcr.io/zebbern/devonz:latest
    container_name: devonz
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:5173"
    
    # ✅ Переменные окружения — задаются через Dokploy UI
    environment:
      - NODE_ENV=production
      - RUNNING_IN_DOCKER=true
      - NODE_OPTIONS=--max-old-space-size=4096
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEVONZ_DB_PATH=${DEVONZ_DB_PATH:-file:./data/devonz.db}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    labels:
      - "com.centurylinklabs.watchtower.scope=devonz"
      - "com.centurylinklabs.watchtower.enable=true"
      - "dokploy.managed=true"
    
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2'

  devonz-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: devonz-dev
    profiles: ["dev"]
    ports:
      - "${PORT:-5173}:5173"
    environment:
      - NODE_ENV=development
      - RUNNING_IN_DOCKER=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app:cached
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: devonz-watchtower
    profiles: ["auto-update"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true
    command: --label-enable
    labels:
      - "com.centurylinklabs.watchtower.scope=devonz"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  default:
    external: true
    name: dokploy-network
